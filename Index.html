<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Pro v2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="html5-qrcode.min.js"></script>
    <style>
        :root { --primary: #0d6efd; --success: #198754; --danger: #dc3545; }
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .hidden { display: none !important; }
        #reader, #loginReader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 12px; overflow: hidden; background: #000; }
        .action-btn { transition: all 0.2s; border: 2px solid #dee2e6; }
        .action-btn.active { background-color: var(--primary) !important; color: white !important; transform: scale(1.05); }
        .status-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body class="p-2">

    <div id="statusMsg" class="alert shadow status-toast"></div>

    <div id="loginSection" class="container mt-4">
        <div class="card p-3 shadow-sm border-0">
            <h3 class="text-center mb-3 text-primary">Bejelentkezés</h3>
            
            <div id="loginReader" class="mb-3"></div>
            <p class="text-center small text-muted">Mutasd fel a kártyád vagy töltsd ki:</p>

            <div class="mb-3">
                <input type="text" id="opNum" class="form-control mb-2 text-center" placeholder="Operátor ID">
                <input type="password" id="pass" class="form-control mb-3 text-center" placeholder="Jelszó">
                <button id="loginBtn" onclick="loginManual()" class="btn btn-primary btn-lg w-100 shadow-sm">BELÉPÉS</button>
            </div>
            <div id="debugInfo" class="small text-center text-muted">Rendszer kész.</div>
        </div>
    </div>

    <div id="mainSection" class="container mt-1 hidden">
        <div class="d-flex justify-content-between align-items-center mb-2 px-1">
            <span id="displayOpName" class="badge bg-primary fs-6"></span>
            <button onclick="location.reload()" class="btn btn-sm btn-outline-danger">Kilépés</button>
        </div>

        <div id="reader"></div>

        <div class="card p-3 mt-2 shadow-sm border-0 text-center">
            <div class="d-flex gap-2 mb-3">
                <button id="btnSTART" onclick="setActivity('START')" class="btn btn-light flex-fill action-btn py-2 fw-bold active">START</button>
                <button id="btnEND" onclick="setActivity('END')" class="btn btn-light flex-fill action-btn py-2 fw-bold">END</button>
                <button id="btnKész" onclick="setActivity('Befejezve')" class="btn btn-light flex-fill action-btn py-2 fw-bold">KÉSZ</button>
            </div>
            <input type="hidden" id="activityValue" value="START">

            <input type="text" id="serialInput" class="form-control form-control-lg mb-2 text-center fw-bold border-primary" readonly placeholder="[ SERIAL ]">
            <input type="text" id="processInput" class="form-control form-control-lg mb-3 text-center fw-bold border-primary" readonly placeholder="[ PROCESS ]">
            
            <button id="saveBtn" onclick="submitData()" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow mb-2">ADATOK RÖGZÍTÉSE</button>
            <button onclick="clearAllFields()" class="btn btn-outline-secondary w-100">Minden adat törlése</button>
        </div>

        <div class="mt-3">
            <h6 class="text-muted small fw-bold border-bottom pb-1">UTOLSÓ 10 RÖGZÍTÉSED:</h6>
            <div id="historyList">Betöltés...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4Fp11xlq_KyaclEMuF-R4j6PM_ZVlY7DcfVLIgVWIlp50q0yYN0H0qdsnF9igh7Rn/exec"; 
        let currentOperator = null;
        let mainScanner = null;
        let loginScanner = null;

        window.onload = () => {
            startLoginScanner();
        };

        // --- BELÉPÉS LOGIKA ---
        function startLoginScanner() {
            loginScanner = new Html5Qrcode("loginReader");
            loginScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (txt) => {
                if(txt.includes(":")) {
                    const parts = txt.split(":");
                    document.getElementById('opNum').value = parts[0];
                    document.getElementById('pass').value = parts[1];
                    vibrate(100);
                    loginManual();
                }
            }).catch(e => console.log(e));
        }

        async function loginManual() {
            const op = document.getElementById('opNum').value;
            const p = document.getElementById('pass').value;
            if(!op || !p) return;

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "login", operatorNum: op, password: p })
                });
                const res = await response.json();
                
                if(res.success) {
                    currentOperator = res.operator;
                    if(loginScanner) await loginScanner.stop();
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('mainSection').classList.remove('hidden');
                    document.getElementById('displayOpName').innerText = "Op: " + currentOperator;
                    startMainScanner();
                    loadHistory();
                } else {
                    showStatus("BELÉPÉSI HIBA: " + res.message, "alert-danger");
                    btn.disabled = false;
                }
            } catch (e) {
                showStatus("Szerver nem elérhető!", "alert-danger");
                btn.disabled = false;
            }
        }

        // --- RÖGZÍTÉS LOGIKA ---
        function startMainScanner() {
            mainScanner = new Html5Qrcode("reader");
            mainScanner.start({ facingMode: "environment" }, { fps: 15, qrbox: {width: 250, height: 150} }, (txt) => {
                const s = document.getElementById('serialInput');
                const p = document.getElementById('processInput');
                if(!s.value) { s.value = txt; vibrate(50); }
                else if(!p.value && s.value !== txt) { p.value = txt; vibrate(50); }
            });
        }

        async function submitData() {
            const s = document.getElementById('serialInput').value;
            const p = document.getElementById('processInput').value;
            const act = document.getElementById('activityValue').value;
            
            if(!s || !p) return showStatus("Hiányzó adatok!", "alert-warning");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: "saveLog", 
                        entry: { serial: s, process: p, operator: currentOperator, activity: act } 
                    })
                });
                const res = await response.json();
                if(res.success) {
                    showStatus("SIKERES MENTÉS!", "alert-success");
                    vibrate(100);
                    clearFieldsAfterSave();
                    loadHistory();
                } else {
                    // Itt jön a piros hibaüzenet, ha pl. nincs az Approved UID-ben
                    showStatus(res.message, "alert-danger");
                    vibrate([100, 50, 100]); // Hosszabb hiba-rezgés
                }
            } catch (e) {
                showStatus("Hiba a küldés során!", "alert-danger");
            }
            btn.disabled = false;
        }

        // --- SEGÉDFÜGGVÉNYEK ---
        function clearFieldsAfterSave() {
            document.getElementById('serialInput').value = "";
            document.getElementById('processInput').value = "";
        }

        function clearAllFields() {
            clearFieldsAfterSave();
            showStatus("Mezők ürítve", "alert-light");
        }

        function setActivity(val) {
            document.getElementById('activityValue').value = val;
            document.querySelectorAll('.action-btn').forEach(btn => btn.classList.remove('active', 'btn-primary', 'text-white'));
            const id = (val === 'Befejezve') ? 'btnKész' : 'btn' + val;
            document.getElementById(id).classList.add('active', 'btn-primary', 'text-white');
        }

        async function loadHistory() {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getLastTen", operator: currentOperator })
                });
                const res = await response.json();
                if(res.success && res.data) {
                    let html = '<div class="list-group">';
                    res.data.forEach(row => {
                        let d = new Date(row[2]);
                        let timeStr = d.getHours() + ":" + (d.getMinutes()<10?'0':'') + d.getMinutes();
                        html += `<div class="list-group-item p-2 small d-flex justify-content-between">
                                    <span><b>${row[1]}</b> (${row[5]})</span>
                                    <span class="text-muted">${timeStr}</span>
                                 </div>`;
                    });
                    document.getElementById('historyList').innerHTML = html + '</div>';
                }
            } catch (e) {}
        }

        function showStatus(msg, cls) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg; el.className = "alert shadow status-toast " + cls;
            el.style.display = "block";
            setTimeout(() => el.style.display = "none", 4000);
        }

        function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
    </script>
</body>
</html>
