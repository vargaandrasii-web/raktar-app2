<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="html5-qrcode.min.js"></script>
    <style>
        :root { --primary: #0d6efd; --success: #198754; }
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .hidden { display: none !important; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 12px; overflow: hidden; background: #000; }
        .action-btn { transition: all 0.2s; border: 2px solid #dee2e6; }
        .action-btn.active { background-color: var(--primary) !important; color: white !important; border-color: var(--primary); transform: scale(1.05); }
        .btn-kész.active { background-color: var(--success) !important; border-color: var(--success); }
        .status-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; display: none; }
    </style>
</head>
<body class="p-2">

    <div id="statusMsg" class="alert shadow status-toast"></div>

    <div id="loginSection" class="container mt-5">
        <div class="card p-4 shadow-sm border-0">
            <h3 class="text-center mb-4 text-primary">Bejelentkezés</h3>
            <div class="mb-3">
                <input type="text" id="opNum" class="form-control form-control-lg mb-2 text-center" placeholder="Operátor azonosító">
                <input type="password" id="pass" class="form-control form-control-lg mb-3 text-center" placeholder="Jelszó">
                <button id="loginBtn" onclick="loginManual()" class="btn btn-primary btn-lg w-100 shadow-sm">BELÉPÉS</button>
            </div>
            <div id="debugInfo" class="small text-center text-muted">Rendszer ellenőrzése...</div>
        </div>
    </div>

    <div id="mainSection" class="container mt-2 hidden">
        <div class="d-flex justify-content-between align-items-center mb-3 px-1">
            <span id="displayOpName" class="badge bg-primary fs-6"></span>
            <button onclick="location.reload()" class="btn btn-sm btn-outline-danger">Kilépés</button>
        </div>

        <div id="reader"></div>

        <div class="card p-3 mt-3 shadow-sm border-0">
            <label class="form-label fw-bold small text-muted text-center d-block">MŰVELET:</label>
            <div class="d-flex gap-2 mb-3">
                <button id="btnSTART" onclick="setActivity('START')" class="btn btn-light flex-fill action-btn py-2 fw-bold active">START</button>
                <button id="btnEND" onclick="setActivity('END')" class="btn btn-light flex-fill action-btn py-2 fw-bold">END</button>
                <button id="btnKész" onclick="setActivity('Befejezve')" class="btn btn-light flex-fill action-btn py-2 fw-bold btn-kész">KÉSZ</button>
            </div>
            <input type="hidden" id="activityValue" value="START">

            <div class="mb-2">
                <input type="text" id="serialInput" class="form-control form-control-lg text-center fw-bold border-primary" readonly placeholder="[ SERIAL ]">
            </div>
            <div class="mb-3">
                <input type="text" id="processInput" class="form-control form-control-lg text-center fw-bold border-primary" readonly placeholder="[ PROCESS ]">
            </div>
            
            <button id="saveBtn" onclick="submitData()" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow">ADATOK RÖGZÍTÉSE</button>
        </div>
        <div class="mt-4">
    <h6 class="text-muted small fw-bold border-bottom pb-1">UTOLSÓ 10 RÖGZÍTÉSED:</h6>
    <div id="historyList">Betöltés...</div>
</div>
    </div>

    <script>
        // --- 1. CONFIG: MÁSOLD BE AZ APPSCRIPT URL-T ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4Fp11xlq_KyaclEMuF-R4j6PM_ZVlY7DcfVLIgVWIlp50q0yYN0H0qdsnF9igh7Rn/exec"; 

        let currentOperator = null;
        let html5QrCode = null;

        window.onload = () => {
            if (typeof Html5Qrcode === "undefined") {
                document.getElementById('debugInfo').innerHTML = "<b class='text-danger'>HIBA: hiányzik a html5-qrcode.min.js!</b>";
            } else {
                document.getElementById('debugInfo').innerText = "Rendszer kész.";
            }
        };

        async function loginManual() {
            const op = document.getElementById('opNum').value;
            const p = document.getElementById('pass').value;
            if(!op || !p) return showStatus("Hiányzó adatok!", "alert-warning");

            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerText = "Ellenőrzés...";

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: "login", operatorNum: op, password: p })
                });
                const res = await response.json();
                
                if(res.success) {
                    currentOperator = res.operator;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('mainSection').classList.remove('hidden');
                    document.getElementById('displayOpName').innerText = "Op: " + currentOperator;
                    startScanner();
                    loadHistory();
                } else {
                    showStatus("Hibás azonosító vagy jelszó!", "alert-danger");
                    btn.disabled = false; btn.innerText = "BELÉPÉS";
                }
            } catch (e) {
                showStatus("Szerver hiba! Ellenőrizd a Script URL-t!", "alert-danger");
                btn.disabled = false; btn.innerText = "BELÉPÉS";
            }
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: {width: 250, height: 150} }, 
                (txt) => {
                    const s = document.getElementById('serialInput');
                    const p = document.getElementById('processInput');
                    if(!s.value) { s.value = txt; vibrate(); }
                    else if(!p.value && s.value !== txt) { p.value = txt; vibrate(); }
                }
            );
        }
        async function loadHistory() {
    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "getLastTen", operator: currentOperator })
        });
        const res = await response.json();
        if(res.success && res.data) {
            let html = '<div class="list-group">';
            res.data.forEach(row => {
                let d = new Date(row[2]);
                let timeStr = d.getHours() + ":" + (d.getMinutes()<10?'0':'') + d.getMinutes();
                html += `
                    <div class="list-group-item list-group-item-action p-2 small">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold">${row[1]}</span>
                            <span class="badge bg-secondary">${row[5]}</span>
                        </div>
                        <div class="text-muted" style="font-size: 0.7rem;">${timeStr} | Process: ${row[4]}</div>
                    </div>`;
            });
            html += '</div>';
            // Kell egy div a HTML-be, aminek az ID-ja 'historyList'
            document.getElementById('historyList').innerHTML = html;
        }
    } catch (e) { console.log("History error", e); }
}
        
        function setActivity(val) {
            document.getElementById('activityValue').value = val;
            document.querySelectorAll('.action-btn').forEach(btn => btn.classList.remove('active'));
            if(val === 'START') document.getElementById('btnSTART').classList.add('active');
            if(val === 'END') document.getElementById('btnEND').classList.add('active');
            if(val === 'Befejezve') document.getElementById('btnKész').classList.add('active');
        }

        async function submitData() {
            const s = document.getElementById('serialInput').value;
            const p = document.getElementById('processInput').value;
            const act = document.getElementById('activityValue').value;
            
            if(!s || !p) return showStatus("Olvasd be mindkét kódot!", "alert-warning");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "Mentés...";

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: "saveLog", 
                        entry: { serial: s, process: p, operator: currentOperator, activity: act } 
                    })
                });
                const res = await response.json();
                if(res.success) {
                    showStatus("Sikeresen mentve!", "alert-success");
                    document.getElementById('serialInput').value = "";
                    document.getElementById('processInput').value = "";
                } else {
                    showStatus(res.message, "alert-danger");
                }
            } catch (e) {
                showStatus("Hiba a mentés során!", "alert-danger");
            }
            btn.disabled = false; btn.innerText = "ADATOK RÖGZÍTÉSE";
        }

        function showStatus(msg, cls) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg; el.className = "alert shadow status-toast " + cls;
            el.style.display = "block";
            setTimeout(() => el.style.display = "none", 3000);
        }

        function vibrate() { if(navigator.vibrate) navigator.vibrate(100); }
    </script>
</body>
</html>
