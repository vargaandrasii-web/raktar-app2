<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro - Debug Mode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" integrity="sha512-r6rDA7W6ZeQhvl8S7nHKz6pIn9h09qXshAk4FA68E96fS0V5Xp9vP79uNqY0O84M7n6DdBQoY3o6T6B5w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        .hidden { display: none !important; }
        #reader { width: 100%; max-width: 450px; margin: auto; min-height: 250px; background: #000; }
        .alert-fixed { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
    </style>
</head>
<body class="p-3">

    <div id="statusMsg" class="alert alert-fixed hidden"></div>

    <div id="loginSection" class="container mt-4">
        <div class="card p-4 shadow-sm">
            <h3 class="text-center mb-4">Bejelentkezés</h3>
            <div class="mb-3">
                <input type="text" id="opNum" class="form-control mb-2" placeholder="Operátor száma">
                <input type="password" id="pass" class="form-control mb-3" placeholder="Jelszó">
                <button onclick="loginManual()" class="btn btn-primary w-100 py-3 mb-2">BELÉPÉS</button>
            </div>
            <div id="qrStatus" class="small text-center text-muted">QR könyvtár töltése...</div>
        </div>
    </div>

    <div id="mainSection" class="container mt-2 hidden">
        <div class="d-flex justify-content-between mb-3">
            <span id="displayOpName" class="fw-bold"></span>
            <button onclick="location.reload()" class="btn btn-outline-danger btn-sm">Kilépés</button>
        </div>
        <div id="reader"></div>
        <div class="mt-3">
            <input type="text" id="serialInput" class="form-control mb-2" readonly placeholder="Serial">
            <input type="text" id="processInput" class="form-control mb-2" readonly placeholder="Process">
            <button id="saveBtn" onclick="submitData()" class="btn btn-success w-100 py-3">RÖGZÍTÉS</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIG (Ezt írd át!) ---
        const SCRIPT_URL = "IDE_MÁSOLD_A_SCRIPT_URL-T"; 

        // Ellenőrizzük, betöltött-e a könyvtár
        window.onload = () => {
            if (typeof Html5Qrcode === "undefined") {
                document.getElementById('qrStatus').innerHTML = "<b class='text-danger'>HIBA: A QR olvasó nem töltődött be!</b>";
            } else {
                document.getElementById('qrStatus').innerText = "Rendszer kész.";
            }
        };

        async function api(payload) {
            console.log("Küldés folyamatban:", payload);
            try {
                // A Google Script POST kéréseket csak átirányítással fogad (302)
                // A fetch alapból követi, de a CORS miatt néha elakad.
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors', // Átváltottunk rendes CORS-ra
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Trükk a CORS elkerülésére
                    body: JSON.stringify(payload)
                });
                const text = await response.text();
                console.log("Nyers válasz:", text);
                return JSON.parse(text);
            } catch (err) {
                console.error("API hiba:", err);
                showStatus("Hiba a szerverrel: " + err.message, "alert-danger");
                return { success: false };
            }
        }

        async function loginManual() {
            const op = document.getElementById('opNum').value;
            const p = document.getElementById('pass').value;
            if(!op || !p) return showStatus("Töltsd ki a mezőket!", "alert-warning");

            const res = await api({ action: "login", operatorNum: op, password: p });
            if(res && res.success) {
                currentOperator = res.operator;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                document.getElementById('displayOpName').innerText = "Op: " + op;
                startScanner();
            } else {
                showStatus("Hibás belépés!", "alert-danger");
            }
        }

        let html5QrCode;
        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (txt) => {
                    const s = document.getElementById('serialInput');
                    const p = document.getElementById('processInput');
                    if(!s.value) s.value = txt;
                    else if(!p.value && s.value !== txt) p.value = txt;
                }
            ).catch(err => console.error("Scanner hiba:", err));
        }

        async function submitData() {
            const s = document.getElementById('serialInput').value;
            const p = document.getElementById('processInput').value;
            if(!s || !p) return showStatus("Hiányzó adatok!", "alert-warning");

            const res = await api({ 
                action: "saveLog", 
                entry: { serial: s, process: p, operator: currentOperator, activity: "START" } 
            });

            if(res.success) {
                showStatus("Mentve!", "alert-success");
                document.getElementById('serialInput').value = "";
                document.getElementById('processInput').value = "";
            }
        }

        function showStatus(msg, cls) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            el.className = "alert alert-fixed " + cls;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
