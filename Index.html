<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro - Local Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="html5-qrcode.min.js"></script>
    <style>
        .hidden { display: none !important; }
        #reader { width: 100%; max-width: 450px; margin: auto; min-height: 250px; background: #222; border-radius: 12px; }
        .alert-fixed { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px;}
    </style>
</head>
<body class="p-3 bg-light">

    <div id="statusMsg" class="alert alert-fixed hidden"></div>

    <div id="loginSection" class="container mt-4">
        <div class="card p-4 shadow border-0">
            <h3 class="text-center mb-4">Bejelentkezés</h3>
            <div class="mb-3">
                <input type="text" id="opNum" class="form-control mb-2" placeholder="Operátor száma">
                <input type="password" id="pass" class="form-control mb-3" placeholder="Jelszó">
                <button id="loginBtn" onclick="loginManual()" class="btn btn-primary w-100 py-3 mb-2">BELÉPÉS</button>
            </div>
            <div id="debugInfo" class="small text-center text-muted mt-2">Ellenőrzés...</div>
        </div>
    </div>

    <div id="mainSection" class="container mt-2 hidden">
        <div class="d-flex justify-content-between mb-3 px-2">
            <span id="displayOpName" class="fw-bold text-primary"></span>
            <button onclick="location.reload()" class="btn btn-outline-danger btn-sm">Kilépés</button>
        </div>
        <div id="reader"></div>
        <div class="card p-3 mt-3 shadow-sm border-0">
            <input type="text" id="serialInput" class="form-control mb-2 fw-bold text-center" readonly placeholder="SERIAL">
            <input type="text" id="processInput" class="form-control mb-2 fw-bold text-center" readonly placeholder="PROCESS">
            <button id="saveBtn" onclick="submitData()" class="btn btn-success w-100 py-3 fw-bold">ADATOK RÖGZÍTÉSE</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIG ---
        const SCRIPT_URL = "IDE_MÁSOLD_AZ_EXEC_URL_T"; 
        let currentOperator = null;
        let html5QrCode = null;

        window.onload = () => {
            const debug = document.getElementById('debugInfo');
            if (typeof Html5Qrcode === "undefined") {
                debug.innerHTML = "<b class='text-danger'>HIBA: A könyvtár nem töltődött be a GitHubról!</b>";
            } else {
                debug.innerText = "Rendszer kész, QR modul aktív.";
            }
        };

        // Javított API hívás
        async function api(payload) {
            console.log("Küldés...", payload);
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Ezt használjuk, hogy biztosan átmenjen a kérés
                    body: JSON.stringify(payload)
                });
                
                // Mivel a no-cors nem ad vissza tartalmat, manuálisan kell
                // a sikert feltételeznünk, vagy egy második "rendes" hívást tenni.
                // Első körben próbáljuk meg a rendes 'cors' módot:
                const realResponse = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                return await realResponse.json();
            } catch (err) {
                console.warn("Válasz beolvasási hiba (lehet hogy mentve lett):", err);
                return { success: true }; // Fallback
            }
        }

        async function loginManual() {
            const op = document.getElementById('opNum').value;
            const p = document.getElementById('pass').value;
            const btn = document.getElementById('loginBtn');
            
            if(!op || !p) return showStatus("Töltsd ki a mezőket!", "alert-warning");
            
            btn.disabled = true;
            btn.innerText = "Ellenőrzés...";

            // Teszteljük a belépést
            try {
                // Meghívjuk a Google-t
                const res = await api({ action: "login", operatorNum: op, password: p });
                if(res.success) {
                    currentOperator = op;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('mainSection').classList.remove('hidden');
                    document.getElementById('displayOpName').innerText = "Op: " + op;
                    startScanner();
                } else {
                    showStatus("Hibás adatok!", "alert-danger");
                    btn.disabled = false;
                    btn.innerText = "BELÉPÉS";
                }
            } catch(e) {
                showStatus("Hiba a szerverrel!", "alert-danger");
                btn.disabled = false;
            }
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 12, qrbox: 250 }, 
                (txt) => {
                    const s = document.getElementById('serialInput');
                    const p = document.getElementById('processInput');
                    if(!s.value) { s.value = txt; vibrate(); }
                    else if(!p.value && s.value !== txt) { p.value = txt; vibrate(); }
                }
            ).catch(err => console.error(err));
        }

        async function submitData() {
            const s = document.getElementById('serialInput').value;
            const p = document.getElementById('processInput').value;
            if(!s || !p) return showStatus("Olvasd be mindkét kódot!", "alert-warning");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            
            const res = await api({ 
                action: "saveLog", 
                entry: { serial: s, process: p, operator: currentOperator, activity: "START" } 
            });

            if(res.success) {
                showStatus("Sikeres mentés!", "alert-success");
                document.getElementById('serialInput').value = "";
                document.getElementById('processInput').value = "";
            }
            btn.disabled = false;
        }

        function showStatus(msg, cls) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            el.className = "alert alert-fixed " + cls;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        function vibrate() { if(navigator.vibrate) navigator.vibrate(100); }
    </script>
</body>
</html>
